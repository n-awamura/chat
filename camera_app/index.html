<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RECEIPT CAMERA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- Common Meta / Links from template (some are omitted as not used) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- <meta name="apple-mobile-web-app-status-bar-style" content="default"> -->
    <!-- <meta name="apple-mobile-web-app-title" content="..."> -->
    <!-- <meta name="theme-color" content="..."> -->
    <link rel="apple-touch-icon" sizes="180x180" href="fudaoxiang.png">

    <!-- Common External CSS from template -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Noto Sans JP is loaded via base.css -->

    <!-- Base CSS (Common Styles) -->
    <link rel="stylesheet" href="../template/css/base.css">

    <!-- App Specific CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google API Libraries (App specific) -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

</head>
<body>
    <!-- Header (using template structure) -->
    <header id="main-header">
        <div class="logo-container">
            <img src="fudaoxiang.png" alt="Logo" class="header-image">
            <span class="title">RECEIPT CAMERA</span>
        </div>
        <div class="header-controls">
            <!-- No controls in this app -->
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content">
        <div id="main-content">
            <video id="camera" autoplay playsinline></video>
            <img id="captured-image" alt="Captured Image" style="display: none;">

            <!-- プレビュー用コンテナ -->
            <div id="upload-preview-container" style="display: none;">
                <div id="upload-progress-text"></div>
                <!-- 画像はここにJSで追加 -->
            </div>
        </div>

        <canvas id="canvas" style="display: none;"></canvas>

        <!-- 下部ボタンコンテナ (App specific layout element) -->
        <div class="button-container">
            <button id="capture-button"><i class="bi bi-camera-fill"></i></button>
            <button id="preview-upload-button">
                <i class="bi bi-stack"></i>
                <span id="photo-count-badge">0</span>
            </button>
        </div>

        <!-- ★ シャッター音用のaudio要素を追加 -->
        <audio id="shutter-sound" src="shutter.mp3" preload="auto" style="display: none;"></audio>
    </main>

    <!-- Common JS (loaded before app specific) -->
    <script src="../template/js/common.js"></script>

    <!-- App Specific JS -->
    <script src="script.js" type="module"></script>

</body>
</html>
