<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Gemini Grounding テスト</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2em;
    }
    input, button {
      padding: 0.5em;
      font-size: 1rem;
    }
    #answer {
      white-space: pre-wrap;
      margin-top: 1em;
      background: #f0f0f0;
      padding: 1em;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>🔍 Gemini 検索グラウンディング テスト</h2>
  <input type="text" id="prompt" placeholder="質問を入力してください" size="40">
  <button onclick="ask()">送信</button>

  <div id="answer">
    <strong>回答：</strong>
    <div id="responseText">（ここに回答が表示されます）</div>
    <div><strong>参考URL：</strong></div>
    <ul id="sources"></ul>
  </div>

  <script>
    async function ask() {
      const prompt = document.getElementById("prompt").value;
      const responseText = document.getElementById("responseText");
      const sourcesElem = document.getElementById("sources");

      if (!prompt) {
        alert("質問を入力してください！");
        return;
      }

      responseText.textContent = "読み込み中...";
      sourcesElem.innerHTML = "";

      try {
        const res = await fetch(`https://gemini-grounding.fudaoxiang-gym.workers.dev?q=${encodeURIComponent(prompt)}`);
        const data = await res.json();

        responseText.textContent = data.answer;

        data.sources.forEach(src => {
          const li = document.createElement("li");
          li.textContent = src;
          sourcesElem.appendChild(li);
        });
      } catch (err) {
        responseText.textContent = "エラーが発生しました：" + err.message;
      }
    }
  </script>
</body>
</html>
